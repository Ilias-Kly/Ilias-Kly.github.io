<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Spotify</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #000;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        .search-box {
            flex: 1;
            display: flex;
            background: white;
            border-radius: 25px;
            overflow: hidden;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            background: #1DB954;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, #2D1B69 0%, #000 100%);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .quick-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .quick-card i {
            font-size: 24px;
            background: linear-gradient(135deg, #450AF5, #C4EFD9);
            border-radius: 5px;
            padding: 8px;
        }

        /* Music Grid */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .music-card {
            background: #181818;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .music-card:hover {
            background: #282828;
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            background: #333;
            border-radius: 5px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .music-card:hover .play-btn {
            opacity: 1;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .card-artist {
            color: #B3B3B3;
            font-size: 12px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 10px;
            border-top: 1px solid #333;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #B3B3B3;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: white;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Player Bar */
        .player-bar {
            background: #181818;
            padding: 10px 15px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 12px;
            color: #B3B3B3;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .play-btn-main {
            background: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #B3B3B3;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #1DB954;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar música...">
                <button id="searchBtn">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <!-- Home Section -->
            <div id="home" class="section active">
                <h2>Buenos días</h2>
                <div class="quick-actions">
                    <div class="quick-card" onclick="app.showSection('search')">
                        <i class="bi bi-search"></i>
                        <span>Buscar música</span>
                    </div>
                    <div class="quick-card" onclick="app.showSection('library')">
                        <i class="bi bi-music-note-list"></i>
                        <span>Tu biblioteca</span>
                    </div>
                </div>

                <h3 style="margin: 30px 0 15px 0;">Recomendado para ti</h3>
                <div id="recommended" class="music-grid">
                    <!-- Las canciones se cargan aquí -->
                </div>
            </div>

            <!-- Search Section -->
            <div id="search" class="section">
                <h2>Buscar</h2>
                <div id="searchResults" class="music-grid">
                    <!-- Los resultados de búsqueda aparecen aquí -->
                </div>
            </div>

            <!-- Library Section -->
            <div id="library" class="section">
                <h2>Tu biblioteca</h2>
                <div class="loading">
                    <p>Tu música aparecerá aquí</p>
                </div>
            </div>
        </div>

        <!-- Player Bar -->
        <div class="player-bar">
            <div class="track-info">
                <div class="track-name">Selecciona una canción</div>
                <div class="track-artist">Para comenzar a reproducir</div>
            </div>
            <div class="player-controls">
                <button class="control-btn" onclick="app.previousTrack()">
                    <i class="bi bi-skip-start-fill"></i>
                </button>
                <button class="play-btn-main" onclick="app.togglePlay()">
                    <i class="bi bi-play-fill"></i>
                </button>
                <button class="control-btn" onclick="app.nextTrack()">
                    <i class="bi bi-skip-end-fill"></i>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a class="nav-item active" onclick="app.showSection('home')">
                <i class="bi bi-house-door"></i>
                <span>Inicio</span>
            </a>
            <a class="nav-item" onclick="app.showSection('search')">
                <i class="bi bi-search"></i>
                <span>Buscar</span>
            </a>
            <a class="nav-item" onclick="app.showSection('library')">
                <i class="bi bi-collection"></i>
                <span>Biblioteca</span>
            </a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
