<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Música FUNCIONAL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Simple */
        .header {
            background: #1DB954;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* Navegación Simple */
        .nav {
            display: flex;
            background: #000;
            border-bottom: 1px solid #333;
        }

        .nav-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #B3B3B3;
            font-size: 14px;
            cursor: pointer;
        }

        .nav-btn.active {
            color: white;
            border-bottom: 2px solid #1DB954;
        }

        /* Contenido */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Búsqueda Simple */
        .search-box {
            display: flex;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px 0 0 4px;
            font-size: 16px;
        }

        .search-box button {
            background: #1DB954;
            border: none;
            padding: 0 20px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            color: white;
        }

        /* Lista de Canciones Simple */
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #181818;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .song-item:hover {
            background: #282828;
        }

        .song-cover {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 4px;
            margin-right: 15px;
            background-size: cover;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .song-artist {
            color: #B3B3B3;
            font-size: 12px;
        }

        .play-btn {
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: black;
        }

        /* Player Simple */
        .player {
            background: #181818;
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .player-artist {
            color: #B3B3B3;
            font-size: 12px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .main-play-btn {
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: black;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #B3B3B3;
        }

        .version {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #1DB954;
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="version">V3 SIMPLE FUNCIONAL</div>
    
    <div class="app">
        <!-- Header -->
        <div class="header">
            MI MÚSICA 🎵
        </div>

        <!-- Navegación -->
        <div class="nav">
            <button class="nav-btn active" onclick="app.showSection('inicio')">INICIO</button>
            <button class="nav-btn" onclick="app.showSection('playlist')">PLAYLIST</button>
        </div>

        <!-- Contenido -->
        <div class="content">
            <!-- Inicio -->
            <div id="inicio" class="section active">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar canción...">
                    <button onclick="app.searchMusic()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>

                <h3 style="margin-bottom: 15px;">Canciones Populares</h3>
                <div id="results" class="song-list">
                    <!-- Las canciones aparecen aquí -->
                </div>
            </div>

            <!-- Playlist -->
            <div id="playlist" class="section">
                <h3 style="margin-bottom: 15px;">Tu Playlist</h3>
                <div id="playlist-songs" class="song-list">
                    <div class="loading">
                        <p>Agrega canciones desde Inicio</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Player -->
        <div class="player">
            <div class="player-info">
                <div class="player-title" id="currentTitle">Selecciona una canción</div>
                <div class="player-artist" id="currentArtist">Para reproducir</div>
            </div>
            <div class="player-controls">
                <button class="control-btn" onclick="app.previousSong()">
                    <i class="bi bi-skip-backward"></i>
                </button>
                <button class="main-play-btn" onclick="app.togglePlay()">
                    <i class="bi bi-play-fill"></i>
                </button>
                <button class="control-btn" onclick="app.nextSong()">
                    <i class="bi bi-skip-forward"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // APP SUPER SIMPLE Y FUNCIONAL
        class MusicApp {
            constructor() {
                this.currentSong = null;
                this.isPlaying = false;
                this.playlist = [];
                this.init();
            }

            init() {
                console.log('🎵 APP INICIADA - VERSIÓN 3 FUNCIONAL');
                this.loadPopularSongs();
            }

            showSection(section) {
                // Actualizar botones
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                // Mostrar sección
                document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
                document.getElementById(section).classList.add('active');
            }

            async searchMusic() {
                const query = document.getElementById('searchInput').value.trim();
                if (!query) {
                    alert('Escribe algo para buscar');
                    return;
                }

                document.getElementById('results').innerHTML = '<div class="loading">Buscando...</div>';

                try {
                    // API directa y simple
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UC-9-kyTW8ZkZNDHQJ6FgpwQ`);
                    const data = await response.json();
                    
                    // Simular resultados de búsqueda
                    const songs = [
                        {
                            id: 'kJQP7kiw5Fk',
                            title: 'Despacito - Luis Fonsi',
                            artist: 'Luis Fonsi',
                            cover: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg'
                        },
                        {
                            id: 'JGwWNGJdvx8',
                            title: 'Shape of You - Ed Sheeran', 
                            artist: 'Ed Sheeran',
                            cover: 'https://img.youtube.com/vi/JGwWNGJdvx8/mqdefault.jpg'
                        },
                        {
                            id: '60ItHLz5WEA',
                            title: 'Blinding Lights - The Weeknd',
                            artist: 'The Weeknd', 
                            cover: 'https://img.youtube.com/vi/60ItHLz5WEA/mqdefault.jpg'
                        }
                    ];

                    this.displaySongs(songs, 'results');
                } catch (error) {
                    console.log('Error:', error);
                    this.loadPopularSongs();
                }
            }

            loadPopularSongs() {
                const songs = [
                    {
                        id: 'kJQP7kiw5Fk',
                        title: 'Despacito',
                        artist: 'Luis Fonsi',
                        cover: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg'
                    },
                    {
                        id: 'JGwWNGJdvx8',
                        title: 'Shape of You',
                        artist: 'Ed Sheeran',
                        cover: 'https://img.youtube.com/vi/JGwWNGJdvx8/mqdefault.jpg'
                    },
                    {
                        id: '60ItHLz5WEA', 
                        title: 'Blinding Lights',
                        artist: 'The Weeknd',
                        cover: 'https://img.youtube.com/vi/60ItHLz5WEA/mqdefault.jpg'
                    },
                    {
                        id: 'UN4h8p6gTpM',
                        title: 'Flowers',
                        artist: 'Miley Cyrus',
                        cover: 'https://img.youtube.com/vi/UN4h8p6gTpM/mqdefault.jpg'
                    }
                ];

                this.displaySongs(songs, 'results');
            }

            displaySongs(songs, containerId) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';

                songs.forEach(song => {
                    const songElement = document.createElement('div');
                    songElement.className = 'song-item';
                    songElement.innerHTML = `
                        <div class="song-cover" style="background-image: url('${song.cover}')"></div>
                        <div class="song-info">
                            <div class="song-title">${song.title}</div>
                            <div class="song-artist">${song.artist}</div>
                        </div>
                        <button class="play-btn" onclick="app.playSong('${song.id}', '${song.title}', '${song.artist}', '${song.cover}')">
                            <i class="bi bi-play-fill"></i>
                        </button>
                    `;
                    container.appendChild(songElement);
                });
            }

            playSong(id, title, artist, cover) {
                console.log('🎵 Reproduciendo:', title);
                
                this.currentSong = { id, title, artist, cover };
                
                // Actualizar player
                document.getElementById('currentTitle').textContent = title;
                document.getElementById('currentArtist').textContent = artist;
                
                // Cambiar icono a pausa
                document.querySelector('.main-play-btn i').className = 'bi bi-pause-fill';
                this.isPlaying = true;

                // REPRODUCIR EN YOUTUBE DIRECTAMENTE
                window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
                
                // Agregar a playlist
                this.addToPlaylist(this.currentSong);
            }

            addToPlaylist(song) {
                if (!this.playlist.find(s => s.id === song.id)) {
                    this.playlist.push(song);
                    this.updatePlaylistDisplay();
                }
            }

            updatePlaylistDisplay() {
                const container = document.getElementById('playlist-songs');
                if (this.playlist.length === 0) {
                    container.innerHTML = '<div class="loading"><p>Agrega canciones desde Inicio</p></div>';
                    return;
                }

                this.displaySongs(this.playlist, 'playlist-songs');
            }

            togglePlay() {
                if (!this.currentSong) {
                    alert('Selecciona una canción primero');
                    return;
                }

                const playBtn = document.querySelector('.main-play-btn i');
                if (this.isPlaying) {
                    playBtn.className = 'bi bi-play-fill';
                    this.isPlaying = false;
                    console.log('⏸️ Pausado');
                } else {
                    playBtn.className = 'bi bi-pause-fill';
                    this.isPlaying = true;
                    console.log('▶️ Reproduciendo');
                    // Abrir YouTube si no está reproduciendo
                    window.open(`https://www.youtube.com/watch?v=${this.currentSong.id}`, '_blank');
                }
            }

            previousSong() {
                console.log('⏮️ Canción anterior');
            }

            nextSong() {
                console.log('⏭️ Siguiente canción');
            }
        }

        // Iniciar app
        const app = new MusicApp();
    </script>
</body>
</html>
