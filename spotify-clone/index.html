<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Música 🎵</title>
    <style>
        :root {
            --negrito-bonito: #0a0a0a;
            --verde-spotify: #1DB954;
            --glass-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--negrito-bonito);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efecto Liquid Glass para el header */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-btn {
            background: var(--verde-spotify);
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #1ed760;
        }

        /* Navegación */
        .nav {
            display: flex;
            background: var(--negrito-bonito);
            border-bottom: 1px solid #333;
        }

        .nav-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-btn.active {
            color: white;
            border-bottom: 2px solid var(--verde-spotify);
        }

        /* Contenido principal */
        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Efecto Liquid Glass para las tarjetas */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .music-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            background: #333;
            border-radius: 8px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .card-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        /* Estados de carga */
        .loading {
            text-align: center;
            padding: 40px;
            color: #b3b3b3;
        }

        .spinner {
            font-size: 24px;
            margin-bottom: 10px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #b3b3b3;
            grid-column: 1 / -1;
        }

        /* Botones en las cards */
        .play-btn, .add-btn, .remove-btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .play-btn {
            bottom: 10px;
            right: 10px;
            background: #1DB954;
        }

        .add-btn {
            top: 10px;
            right: 10px;
        }

        .remove-btn {
            top: 10px;
            right: 10px;
            background: #ff4444;
        }

        .music-card:hover .play-btn,
        .music-card:hover .add-btn,
        .music-card:hover .remove-btn {
            opacity: 1;
        }

        .card-duration {
            font-size: 11px;
            color: #b3b3b3;
            margin-top: 5px;
        }

        /* Player bar con controles */
        .player-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .player-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        .player-controls button {
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Mensajes */
        .message {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1DB954;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 1000;
            font-size: 14px;
        }
    </style>
</head>

                searchBtn.addEventListener('click', () => this.searchMusic());
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchMusic();

                console.log("✅ Event listeners configurados");

            showSection(sectionId) {
                document.querySelectorAll('.section').forEach(section => {
                    section.classList.remove('active');

                document.getElementById(sectionId).classList.add('active');
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                const buttons = document.querySelectorAll('.nav-btn');
                const targetBtn = Array.from(buttons).find(btn => 
                    btn.textContent.includes(sectionId === 'inicio' ? 'Inicio' : 'Playlist')
                );
                if (targetBtn) targetBtn.classList.add('active');
            }

            async searchMusic() {
                const query = document.querySelector('.search-input').value.trim();
                if (!query) {
                    this.showMessage('Escribe algo para buscar 🎵');
                    return;
                }

                this.showLoading();
                console.log(`🔍 Buscando en YouTube: ${query}`);

                try {
                    // BÚSQUEDA REAL EN YOUTUBE
                    const results = await this.searchYouTubeReal(query);
                    this.displaySearchResults(results);
                    
                } catch (error) {
                    console.error('Error en búsqueda:', error);
                    this.showMessage('❌ Error al buscar. Probando alternativa...');
                    // Alternativa: buscar con otra API
                    await this.searchYouTubeAlternative(query);
                }
            }

            async searchYouTubeReal(query) {
                // Usar Invidious API para búsqueda REAL
                const searchUrl = `https://vid.puffyan.us/api/v1/search?q=${encodeURIComponent(query)}&type=video`;
                
                console.log(`🌐 Buscando en: ${searchUrl}`);
                
                const response = await fetch(searchUrl);
                if (!response.ok) throw new Error('API no respondió');
                
                const data = await response.json();
                console.log('📦 Resultados recibidos:', data.length);
                
                // Procesar resultados reales
                const musicVideos = data
                    .filter(item => 
                        item.type === 'video' && 
                        !item.title.toLowerCase().includes('podcast') &&
                        !item.title.toLowerCase().includes('live') &&
                        item.lengthSeconds > 60
                    )
                    .slice(0, 15)
                    .map(item => ({
                        id: item.videoId,
                        title: item.title,
                        artist: item.author,
                        duration: this.formatDuration(item.lengthSeconds),
                        thumbnail: item.videoThumbnails?.[3]?.url || item.videoThumbnails?.[0]?.url
                    }));

                if (musicVideos.length === 0) {
                    throw new Error('No se encontraron resultados');
                }

                return musicVideos;
            }
