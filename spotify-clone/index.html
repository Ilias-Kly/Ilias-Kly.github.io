<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Música 🎵 SIN ANUNCIOS</title>
    <style>
        :root {
            --negrito-bonito: #0a0a0a;
            --verde-spotify: #1DB954;
            --glass-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--negrito-bonito);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            background: var(--verde-spotify);
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-size: 18px;
        }

        .nav {
            display: flex;
            background: var(--negrito-bonito);
            border-bottom: 1px solid #333;
        }

        .nav-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .nav-btn.active {
            color: white;
            border-bottom: 2px solid var(--verde-spotify);
        }

        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .music-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(160%);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-5px);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            background: #333;
            border-radius: 8px;
            margin-bottom: 12px;
            background-size: cover;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        .play-btn, .add-btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .play-btn {
            bottom: 10px;
            right: 10px;
            background: #1DB954;
        }

        .add-btn {
            top: 10px;
            right: 10px;
        }

        .music-card:hover .play-btn,
        .music-card:hover .add-btn {
            opacity: 1;
        }

        .player-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .player-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        .player-controls button {
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b3b3b3;
        }

        .message {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1DB954;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="🔍 Buscar música...">
            <button class="search-btn">🎵</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="app.showSection('inicio')">🏠 Inicio</button>
        <button class="nav-btn" onclick="app.showSection('playlist')">📋 Playlist</button>
    </div>

    <div class="main-content">
        <div id="inicio" class="section active">
            <h2>🎵 Busca tu música</h2>
            <div id="search-results" class="music-grid"></div>
        </div>

        <div id="playlist" class="section">
            <h2>📋 Tu Playlist</h2>
            <div id="playlist-songs" class="music-grid"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <div class="player-title" id="current-title">🎵 Selecciona una canción</div>
            <div class="player-artist" id="current-artist">Tu música te espera</div>
        </div>
        <div class="player-controls">
            <button onclick="app.togglePlay()">▶️</button>
            <button onclick="app.stopPlayback()">⏹️</button>
        </div>
    </div>

    <script>
        class MusicApp {
            constructor() {
                this.currentTrack = null;
                this.playlist = JSON.parse(localStorage.getItem('miPlaylist')) || [];
                this.isPlaying = false;
                this.audioPlayer = new Audio();
                this.init();
            }

            init() {
                console.log("🎵 Iniciando YouTube ReVanced...");
                this.setupEventListeners();
                this.loadPlaylist();
            }

            setupEventListeners() {
                document.querySelector('.search-btn').addEventListener('click', () => this.searchMusic());
                document.querySelector('.search-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchMusic();
                });
            }

            async searchMusic() {
                const query = document.querySelector('.search-input').value.trim();
                if (!query) return this.showMessage('Escribe algo para buscar 🎵');

                this.showLoading();
                
                try {
                    // USANDO YOUTUBE INVIDIOUS + PIPED (ReVanced style)
                    const results = await this.searchYouTubeReVanced(query);
                    this.displaySearchResults(results);
                } catch (error) {
                    console.error('Error:', error);
                    this.showMessage('⚠️ Usando búsqueda alternativa');
                    const results = await this.searchYouTubeDirect(query);
                    this.displaySearchResults(results);
                }
            }

            async searchYouTubeReVanced(query) {
                // API de Piped/ReVanced - Sin anuncios
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music`);
                const data = await response.json();
                
                return data.items
                    .filter(item => item.type === 'stream')
                    .slice(0, 15)
                    .map(item => ({
                        id: item.url.split('/').pop(),
                        title: item.title,
                        artist: item.uploaderName,
                        thumbnail: item.thumbnail,
                        duration: this.formatDuration(item.duration)
                    }));
            }

            async searchYouTubeDirect(query) {
                // Fallback: YouTube Direct
                const response = await fetch(`https://ytapi.deno.dev/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                const data = await response.json();
                
                return data
                    .filter(item => item.type === 'video')
                    .slice(0, 12)
                    .map(item => ({
                        id: item.videoId,
                        title: item.title,
                        artist: item.author,
                        thumbnail: item.videoThumbnails?.[3]?.url || item.videoThumbnails?.[0]?.url,
                        duration: this.formatDuration(item.lengthSeconds)
                    }));
            }

            displaySearchResults(results) {
                const container = document.getElementById('search-results');
                
                if (!results || results.length === 0) {
                    container.innerHTML = '<div class="loading">🎵 No se encontraron resultados</div>';
                    return;
                }

                container.innerHTML = results.map(song => `
                    <div class="music-card">
                        <div class="card-cover" style="background-image: url('${song.thumbnail}')"></div>
                        <div class="card-title">${this.cleanTitle(song.title)}</div>
                        <div class="card-artist">${song.artist}</div>
                        <div class="card-duration">${song.duration}</div>
                        <button class="play-btn" onclick="app.playSong('${song.id}', '${song.title}', '${song.artist}')">
                            ▶️
                        </button>
                        <button class="add-btn" onclick="app.addToPlaylist(${JSON.stringify(song).replace(/"/g, '&quot;')})">
                            ➕
                        </button>
                    </div>
                `).join('');

                this.showMessage(`✅ ${results.length} canciones encontradas`);
            }

            async playSong(videoId, title, artist) {
                console.log(`🎵 Reproduciendo: ${title}`);
                
                this.currentTrack = { id: videoId, title, artist };
                this.updatePlayer();
                
                try {
                    // STREAM DIRECTO SIN ANUNCIOS (ReVanced style)
                    const audioUrl = await this.getAudioStream(videoId);
                    this.audioPlayer.src = audioUrl;
                    this.audioPlayer.play();
                    this.isPlaying = true;
                    this.updatePlayButton();
                    this.showMessage(`🎵 Reproduciendo: ${title}`);
                } catch (error) {
                    this.showMessage('❌ Error al reproducir');
                }
            }

            async getAudioStream(videoId) {
                // Stream de audio directo usando yt-dlp style
                const services = [
                    `https://pipedapi.kavin.rocks/streams/${videoId}`,
                    `https://ytapi.deno.dev/api/v1/videos/${videoId}`
                ];

                for (const service of services) {
                    try {
                        const response = await fetch(service);
                        const data = await response.json();
                        return data.audioStreams?.[0]?.url || data.formatStreams?.[0]?.url;
                    } catch (error) {
                        continue;
                    }
                }
                throw new Error('No se pudo obtener audio');
            }

            togglePlay() {
                if (!this.currentTrack) return this.showMessage('🎵 Selecciona una canción primero');
                
                if (this.isPlaying) {
                    this.audioPlayer.pause();
                    this.isPlaying = false;
                } else {
                    this.audioPlayer.play();
                    this.isPlaying = true;
                }
                this.updatePlayButton();
            }

            stopPlayback() {
                this.audioPlayer.pause();
                this.audioPlayer.currentTime = 0;
                this.isPlaying = false;
                this.updatePlayButton();
            }

            updatePlayButton() {
                const btn = document.querySelector('.player-controls button');
                if (btn) btn.innerHTML = this.isPlaying ? '⏸️' : '▶️';
            }

            addToPlaylist(song) {
                if (!this.playlist.find(s => s.id === song.id)) {
                    this.playlist.push(song);
                    this.savePlaylist();
                    this.showMessage(`✅ "${this.cleanTitle(song.title)}" añadida`);
                }
            }

            loadPlaylist() {
                const container = document.getElementById('playlist-songs');
                if (this.playlist.length === 0) {
                    container.innerHTML = '<div class="loading">📋 Playlist vacía</div>';
                    return;
                }
                container.innerHTML = this.playlist.map(song => `
                    <div class="music-card">
                        <div class="card-cover" style="background-image: url('${song.thumbnail}')"></div>
                        <div class="card-title">${song.title}</div>
                        <div class="card-artist">${song.artist}</div>
                        <button class="play-btn" onclick="app.playSong('${song.id}', '${song.title}', '${song.artist}')">
                            ▶️
                        </button>
                        <button class="add-btn" onclick="app.removeFromPlaylist('${song.id}')">
                            ❌
                        </button>
                    </div>
                `).join('');
            }

            removeFromPlaylist(songId) {
                this.playlist = this.playlist.filter(song => song.id !== songId);
                this.savePlaylist();
                this.loadPlaylist();
            }

            savePlaylist() {
                localStorage.setItem('miPlaylist', JSON.stringify(this.playlist));
            }

            updatePlayer() {
                if (this.currentTrack) {
                    document.getElementById('current-title').textContent = this.currentTrack.title;
                    document.getElementById('current-artist').textContent = this.currentTrack.artist;
                }
            }

            showSection(sectionId) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(sectionId).classList.add('active');
                
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            showLoading() {
                document.getElementById('search-results').innerHTML = `
                    <div class="loading">
                        <div>🎵</div>
                        <p>Buscando en YouTube ReVanced...</p>
                    </div>
                `;
            }

            showMessage(text) {
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.textContent = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            }

            cleanTitle(title) {
                return title.replace(/\([^)]*\)/g, '').replace(/\[[^\]]*\]/g, '').trim();
            }

            formatDuration(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        const app = new MusicApp();
    </script>
</body>
</html>
