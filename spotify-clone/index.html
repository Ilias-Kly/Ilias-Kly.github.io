<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Música 🎵</title>
    <style>
        :root {
            --negrito-bonito: #0a0a0a;
            --verde-spotify: #1DB954;
            --glass-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--negrito-bonito);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efecto Liquid Glass para el header */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-btn {
            background: var(--verde-spotify);
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #1ed760;
        }

        /* Navegación */
        .nav {
            display: flex;
            background: var(--negrito-bonito);
            border-bottom: 1px solid #333;
        }

        .nav-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-btn.active {
            color: white;
            border-bottom: 2px solid var(--verde-spotify);
        }

        /* Contenido principal */
        .main-content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Efecto Liquid Glass para las tarjetas */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .music-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            background: #333;
            border-radius: 8px;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .card-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        /* Estados de carga */
        .loading {
            text-align: center;
            padding: 40px;
            color: #b3b3b3;
        }

        .spinner {
            font-size: 24px;
            margin-bottom: 10px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #b3b3b3;
            grid-column: 1 / -1;
        }

        /* Botones en las cards */
        .play-btn, .add-btn, .remove-btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .play-btn {
            bottom: 10px;
            right: 10px;
            background: #1DB954;
        }

        .add-btn {
            top: 10px;
            right: 10px;
        }

        .remove-btn {
            top: 10px;
            right: 10px;
            background: #ff4444;
        }

        .music-card:hover .play-btn,
        .music-card:hover .add-btn,
        .music-card:hover .remove-btn {
            opacity: 1;
        }

        .card-duration {
            font-size: 11px;
            color: #b3b3b3;
            margin-top: 5px;
        }

        /* Player bar con controles */
        .player-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .player-artist {
            color: #b3b3b3;
            font-size: 12px;
        }

        .player-controls button {
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Header con búsqueda -->
    <div class="header">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="🔍 Buscar música...">
            <button class="search-btn">🎵</button>
        </div>
    </div>

    <!-- Navegación simple -->
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('inicio')">🏠 Inicio</button>
        <button class="nav-btn" onclick="showSection('playlist')">📋 Playlist</button>
    </div>

    <!-- Contenido principal -->
    <div class="main-content">
        <!-- Sección Inicio -->
        <div id="inicio" class="section active">
            <h2>🎵 Buscar</h2>
            <p>Escribe en la barra de arriba para encontrar canciones</p>
            <div id="search-results" class="music-grid">
                <!-- Los resultados de búsqueda aparecerán aquí -->
            </div>
        </div>

        <!-- Sección Playlist -->
        <div id="playlist" class="section">
            <h2>📋 Tu Playlist</h2>
            <div id="playlist-songs" class="music-grid">
                <!-- Las canciones guardadas aparecerán aquí -->
            </div>
        </div>
    </div>

    <!-- Player -->
    <div class="player-bar">
        <div class="player-info">
            <div class="player-title">🎵 Selecciona una canción</div>
            <div class="player-artist">Tu música te espera</div>
        </div>
        <div class="player-controls">
            <button onclick="app.togglePlay()">▶️</button>
            <button onclick="app.stopPlayback()">⏹️</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Función simple para cambiar entre secciones
        function showSection(sectionId) {
            // Ocultar todas las secciones
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            
            // Mostrar la sección seleccionada
            document.getElementById(sectionId).classList.add('active');
            
            // Actualizar botones de navegación
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        console.log("✅ Interfaz cargada - Spotify SIN anuncios");
    </script>
</body>
</html>
