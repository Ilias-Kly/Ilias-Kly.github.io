<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ayuda a Víctor · Pixel retro</title>
  <!-- mantenemos la tipografía pixel Art -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* === ESTILO PIXEL DURO, SIN BLUR, SIN VENTANAS MODERNAS === */
    * {
      box-sizing: border-box;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    body {
      margin: 0;
      background: #402b1a;  /* marrón oscuro base, como consola vieja */
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    /* contenedor principal con borde duro y sombra brutal */
    .pixel-container {
      max-width: 1000px;
      width: 100%;
      background: #9bbc7a;  /* verde gameboy clásico */
      border: 6px solid #0f2f0f;
      box-shadow: 12px 12px 0 #0a1e0a;
      padding: 30px 20px 30px 20px;
      image-rendering: pixelated;
    }

    h1 {
      font-size: 24px;
      color: #1f3a2f;
      text-align: center;
      margin: 0 0 20px 0;
      line-height: 1.4;
      text-shadow: 3px 3px 0 #6b8c5c;
      word-break: break-word;
    }

    /* barra de progreso estilo 8 bits */
    .progress-block {
      background: #4a6b3f;
      border: 4px solid #1f3a1f;
      padding: 12px 15px;
      margin: 20px 0 25px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      box-shadow: inset 0 -4px 0 #2c472c;
    }
    .mistakes-pixel {
      background: #b13e3e;
      color: #ffd5b0;
      padding: 10px 20px;
      border: 4px solid #4f1a1a;
      font-size: 18px;
      white-space: nowrap;
      box-shadow: 5px 5px 0 #3f1515;
    }
    .mistakes-pixel span {
      font-size: 32px;
      margin-right: 8px;
      color: #ffe0a0;
    }
    .bar-pixel {
      flex: 1;
      min-width: 200px;
      background: #2e4b2e;
      height: 28px;
      border: 4px solid #1f331f;
      box-shadow: inset 0 0 0 2px #6a8c4a;
    }
    .bar-fill {
      width: 0%;
      height: 100%;
      background: #f8d678;
      box-shadow: inset -2px -2px 0 #a87838, inset 2px 2px 0 #ffffa0;
      image-rendering: pixelated;
    }

    /* caja de pregunta pixelada */
    .pixel-question {
      background: #6d8f72;
      border: 5px solid #204d20;
      padding: 25px 20px;
      margin: 25px 0;
      box-shadow: 8px 8px 0 #2e462e, inset -3px -3px 0 #3a603a;
    }
    .pixel-question h2 {
      font-size: 16px;
      color: #001800;
      line-height: 1.8;
      margin: 0;
      text-transform: uppercase;
    }

    /* botones estilo retro duro (sin bordes redondos) */
    .answers-pixel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .pixel-btn {
      background: #c6a87c;
      border: 5px solid #4d3a1f;
      color: #1f2c0e;
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      padding: 20px 8px;
      text-align: center;
      box-shadow: 8px 8px 0 #3f301d;
      cursor: pointer;
      transition: 0.05s linear;
      text-transform: uppercase;
      word-break: break-word;
      line-height: 1.5;
    }
    .pixel-btn:hover {
      background: #dabd94;
      transform: translate(-2px, -2px);
      box-shadow: 10px 10px 0 #3f301d;
    }
    .pixel-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 #3f301d;
    }

    /* zona del camino pixel */
    .pixel-path {
      margin-top: 40px;
      border-top: 6px dotted #2d512d;
      padding-top: 30px;
      position: relative;
    }
    .path-grid-pixel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      background: #577a4a;
      padding: 15px;
      border: 4px solid #1f431f;
      box-shadow: inset 0 0 0 3px #96b68b;
    }
    .tile-pixel {
      width: 42px;
      height: 42px;
      background: #8b6e4b;
      border: 4px solid #422d1a;
      box-shadow: 0 0 0 2px #a5825a inset;
      image-rendering: pixelated;
    }
    .tile-pixel.lit {
      background: #f2d96c;
      border-color: #b38b2c;
      box-shadow: 0 0 0 3px #fce489 inset;
    }

    /* personaje: exactamente con img (victor.png) */
    .character-zone {
      position: relative;
      height: 80px;
      margin: 15px 5px 0;
      background: #3e613b;
      border: 4px solid #194d19;
      box-shadow: inset 0 0 0 3px #699e69;
      image-rendering: pixelated;
    }
    #victorPixel {
      position: absolute;
      bottom: 0px;
      left: 0%;
      width: 52px;            /* tamaño para que se vea bien pixelado */
      height: 52px;
      object-fit: contain;
      image-rendering: pixelated;  /* ¡clave! para que el png mantenga dureza */
      transition: left 0.3s steps(5);  /* movimiento pixelado, a saltos */
      z-index: 30;
      filter: drop-shadow(4px 4px 0 #1d3a1d);
    }
    .flag-pixel {
      position: absolute;
      right: 0%;
      bottom: 8px;
      font-size: 48px;
      transform: translateX(20%);
      filter: drop-shadow(4px 4px 0 #2a4d2a);
      z-index: 20;
    }

    /* pantallas de inicio / fin estilo retro puras */
    .pixel-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1f3f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      border: 16px solid #0f1f0f;
      box-shadow: inset 0 0 0 8px #4a764a;
      visibility: hidden;
      opacity: 0;
      transition: 0.1s step-end;
    }
    .pixel-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .pixel-card {
      background: #a7c8a7;
      border: 8px solid #1d461d;
      padding: 40px 30px;
      text-align: center;
      max-width: 600px;
      box-shadow: 20px 20px 0 #0e360e;
    }
    .pixel-card h2 {
      font-size: 28px;
      color: #142014;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .pixel-card button {
      background: #b88b4a;
      border: 6px solid #4d3513;
      font-family: 'Press Start 2P', cursive;
      font-size: 22px;
      padding: 20px 30px;
      box-shadow: 10px 10px 0 #2f210d;
      cursor: pointer;
      color: #212e0e;
    }
    .pixel-card button:active {
      transform: translate(6px, 6px);
      box-shadow: 4px 4px 0 #2f210d;
    }

    /* texto de fallos en rojo */
    .fallos-display {
      font-size: 16px;
      color: #490000;
      text-shadow: 2px 2px 0 #b27a7a;
    }
  </style>
</head>
<body>

<!-- PANTALLA INICIO PIXEL -->
<div id="startScreen" class="pixel-overlay active">
  <div class="pixel-card">
    <h2>🎮 AYUDA A VÍCTOR<br><span style="font-size:18px;">(GRAFITO vs GRAFENO)</span></h2>
    <p style="margin-bottom:40px; font-size:16px; line-height:1.8;">Responde bien para que Víctor<br>avance 5 casillas. ¡3 fallos y pierde!</p>
    <button onclick="startGame()">▶ EMPEZAR</button>
  </div>
</div>

<!-- PANTALLA RESULTADO -->
<div id="resultScreen" class="pixel-overlay">
  <div class="pixel-card">
    <h2 id="resultMessage">🏁 VICTOR GANA</h2>
    <button onclick="reiniciarJuego()">↻ REINICIAR</button>
  </div>
</div>

<!-- CAJA PRINCIPAL DEL JUEGO -->
<div class="pixel-container">
  <h1>⚡ AYUDA A VÍCTOR ⚡</h1>

  <!-- progreso pixel duro -->
  <div class="progress-block">
    <div class="mistakes-pixel">
      <span id="mistakeDisplay">0</span> FALLOS /3
    </div>
    <div class="bar-pixel">
      <div class="bar-fill" id="progressBarFill" style="width:0%;"></div>
    </div>
  </div>

  <!-- pregunta -->
  <div class="pixel-question">
    <h2 id="questionText">🔍 CARGANDO PREGUNTA...</h2>
  </div>

  <!-- respuestas (se llenan con js) -->
  <div id="answersPixel" class="answers-pixel"></div>

  <!-- CAMINO Y PERSONAJE (con imagen externa victor.png) -->
  <div class="pixel-path">
    <div id="pathPixelGrid" class="path-grid-pixel">
      <!-- se genera con js 20 baldosas -->
    </div>

    <div class="character-zone">
      <!-- VICTOR.PNG – coloca tu archivo en la misma carpeta -->
      <img id="victorPixel" src="victor.png" alt="Víctor pixel" style="left:0%;">
      <div class="flag-pixel">🏁</div>
    </div>
    <p style="font-size:10px; margin-top:10px; color:#253d25;">▼ casilla actual</p>
  </div>
</div>

<script>
  (function() {
    // ---------- BASE DE PREGUNTAS (pixel, sin trampas) ----------
    const questions = [
      { q: "¿Qué elemento forma grafito y grafeno?", answers: ["Oxígeno", "Carbono", "Silicio"], correct: 1 },
      { q: "¿En qué año se aisló el grafeno?", answers: ["2004", "1998", "2012"], correct: 0 },
      { q: "¿Quiénes aislaron el grafeno?", answers: ["Andre Geim y Konstantin Novoselov", "Einstein y Curie", "Newton y Galileo"], correct: 0 },
      { q: "¿Qué premio recibieron?", answers: ["Nobel de Física", "Nobel de Química", "Nobel de Medicina"], correct: 0 },
      { q: "¿Universidad donde se aisló?", answers: ["Mánchester", "Oxford", "Harvard"], correct: 0 },
      { q: "¿Método para obtener grafeno?", answers: ["Cinta adhesiva", "Calentamiento", "Congelación"], correct: 0 },
      { q: "¿Qué son alótropos?", answers: ["Formas del mismo elemento", "Elementos distintos", "Compuestos"], correct: 0 },
      { q: "¿Hibridación del carbono?", answers: ["sp²", "sp", "sp³"], correct: 0 },
      { q: "Estructura del grafito", answers: ["Capas hexagonales", "Cúbica", "Cadenas"], correct: 0 },
      { q: "¿Cómo es el grafeno?", answers: ["Una capa de átomos", "Muchas capas", "Una esfera"], correct: 0 },
      { q: "¿Por qué el grafito es blando?", answers: ["Capas se deslizan", "Es líquido", "Sin enlaces"], correct: 0 },
      { q: "Material 200 veces + fuerte que acero", answers: ["Grafeno", "Grafito", "Aluminio"], correct: 0 },
      { q: "Luz que deja pasar el grafeno", answers: ["97.7%", "80%", "50%"], correct: 0 },
      { q: "Enlaces red hexagonal", answers: ["Covalentes sigma", "Iónicos", "Metálicos"], correct: 0 },
      { q: "Electrones que conducen", answers: ["Electrones pi", "Núcleo", "Protones"], correct: 0 },
      { q: "Fuerzas entre capas grafito", answers: ["Van der Waals", "Magnéticas", "Nucleares"], correct: 0 },
      { q: "¿Por qué grafeno no tiene esas fuerzas?", answers: ["Es una sola capa", "Líquido", "Metálico"], correct: 0 },
      { q: "Uso en lápices", answers: ["Escribir", "Color rojo", "Endurecer"], correct: 0 },
      { q: "¿Dónde se usa en baterías?", answers: ["Ánodo", "Cátodo", "Electrolito"], correct: 0 },
      { q: "Propiedad clave en electrónica", answers: ["Alta conductividad", "Baja conductividad", "Baja resistencia"], correct: 0 }
    ];

    // variables de estado
    let currentQuestionIndex = 0;
    let position = 0;            // 0..5
    let mistakes = 0;
    let gameActive = false;
    let shuffledQuestions = [];

    // elementos DOM
    const startScreen = document.getElementById('startScreen');
    const resultScreen = document.getElementById('resultScreen');
    const resultMsg = document.getElementById('resultMessage');
    const questionEl = document.getElementById('questionText');
    const answersContainer = document.getElementById('answersPixel');
    const mistakeSpan = document.getElementById('mistakeDisplay');
    const progressFill = document.getElementById('progressBarFill');
    const victorImg = document.getElementById('victorPixel');
    const pathGridEl = document.getElementById('pathPixelGrid');

    // funciones auxiliares
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // genera las 20 casillas y resalta según la posición (0-5)
    function renderPath(step) {
      pathGridEl.innerHTML = '';
      // step es 0..5; iluminaremos tantas casillas como paso*4 (para que se vea avance)
      const tilesToLight = step * 4;  // 0,4,8,12,16,20 (máximo 20)
      for (let i = 0; i < 20; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile-pixel';
        if (i < tilesToLight) {
          tile.classList.add('lit');
        }
        pathGridEl.appendChild(tile);
      }
    }

    // actualizar barra y posición de víctor
    function updateProgress() {
      const percent = (position / 5) * 100;
      progressFill.style.width = percent + '%';
      // mover a Víctor: left en % (0% a 86% aprox para que no choque con bandera)
      const leftPercent = position * 17.2; // 5*17.2 = 86% , deja espacio para la bandera
      victorImg.style.left = leftPercent + '%';
    }

    // mostrar pregunta actual (mezclando opciones)
    function renderQuestion() {
      if (!gameActive) return;
      if (currentQuestionIndex >= shuffledQuestions.length) {
        // si no hay más preguntas y no se ha ganado/perdido, pierde (no puede continuar)
        if (position < 5 && mistakes < 3) loseGame();
        return;
      }

      const q = shuffledQuestions[currentQuestionIndex];
      questionEl.innerText = q.q;

      // mezclar orden de índices (0,1,2)
      const optOrder = [0, 1, 2];
      shuffleArray(optOrder);

      let html = '';
      for (let idx of optOrder) {
        const isCorrect = (idx === q.correct) ? 'true' : 'false';
        html += `<div class="pixel-btn" data-correct="${isCorrect}">${q.answers[idx]}</div>`;
      }
      answersContainer.innerHTML = html;

      // asignar eventos
      document.querySelectorAll('.pixel-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (!gameActive) return;
          const correct = e.target.dataset.correct === 'true';
          handleAnswer(correct);
        });
      });
    }

    function handleAnswer(correct) {
      if (!gameActive) return;

      if (correct) {
        position = Math.min(position + 1, 5);
        updateProgress();
        renderPath(position);    // actualiza baldosas iluminadas

        if (position >= 5) {
          winGame();
          return;
        }
      } else {
        mistakes++;
        mistakeSpan.innerText = mistakes;
        if (mistakes >= 3) {
          loseGame();
          return;
        }
      }

      // siguiente pregunta
      currentQuestionIndex++;
      if (currentQuestionIndex >= shuffledQuestions.length) {
        // se acabaron: si no ganó ni perdió, pero no ha llegado, pierde por agotar preguntas
        if (position < 5 && mistakes < 3) loseGame();
        return;
      }
      renderQuestion();
    }

    function winGame() {
      gameActive = false;
      resultMsg.innerText = '🏆 ¡VÍCTOR LLEGÓ AL LAB!';
      resultScreen.classList.add('active');
    }

    function loseGame() {
      gameActive = false;
      resultMsg.innerText = '💀 VÍCTOR QUEDÓ ATRAPADO';
      resultScreen.classList.add('active');
    }

    // resetear todo
    function resetAndStart() {
      // clonar y barajar preguntas
      shuffledQuestions = shuffleArray([...questions]).map(q => ({
        ...q,
        answers: [...q.answers]
      }));
      currentQuestionIndex = 0;
      position = 0;
      mistakes = 0;
      gameActive = true;

      // actualizar interfaz
      mistakeSpan.innerText = '0';
      progressFill.style.width = '0%';
      victorImg.style.left = '0%';
      renderPath(0);
      renderQuestion();
    }

    // funciones globales para botones
    window.startGame = function() {
      startScreen.classList.remove('active');
      resetAndStart();
    };

    window.reiniciarJuego = function() {
      resultScreen.classList.remove('active');
      startScreen.classList.add('active');  // volver al inicio (pide empezar)
      gameActive = false;
    };

    // inicial: dibujar camino vacío (0)
    renderPath(0);
    victorImg.style.left = '0%';
    // el png debe llamarse victor.png y estar en el mismo directorio
    // si no existe, se verá el texto de imagen rota (pero mantenemos estilo)
  })();
</script>

</body>
</html>
